<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodFlow — Focus Mode</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-noise"></div>

  <nav class="nav">
    <div class="nav-brand"><span>🧠</span> MoodFlow</div>
    <ul class="nav-links">
      <li><a href="dashboard.html"><span class="ico">📊</span> Dashboard</a></li>
      <li><a href="mood-detection.html"><span class="ico">💬</span> Check-In</a></li>
      <li><a href="tasks.html"><span class="ico">✅</span> Tasks</a></li>
      <li><a href="focus-mode.html" class="active"><span class="ico">🎯</span> Focus</a></li>
    </ul>
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">U</div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
    <button class="nav-hamburger" onclick="toggleMobileMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav-mobile-menu" id="mobileMenu">
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="mood-detection.html">💬 Check-In</a>
    <a href="tasks.html">✅ Tasks</a>
    <a href="focus-mode.html">🎯 Focus Mode</a>
    <a href="#" onclick="doLogout()" style="color:var(--stressed)">⏻ Logout</a>
  </div>

  <div class="page-wrapper">
    <div class="focus-page">
      <div class="fade-in" style="margin-bottom: 2.5rem">
        <h2 style="font-size: 2.5rem; letter-spacing: -0.03em; margin-bottom: .5rem; background: linear-gradient(135deg, var(--text), var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎯 Focus Mode</h2>
        <p style="color:var(--text-muted); font-size: 1rem">
          Current mood: <strong id="focusMood" style="color:var(--accent); text-shadow: 0 0 12px rgba(99,102,241,0.3)">Not detected</strong> —
          Recommended session: <strong id="focusDuration" style="color: var(--text)">45 min</strong>
        </p>
      </div>

      <!-- Ring timer -->
      <div class="focus-ring-outer" style="margin-bottom:1.5rem">
        <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <circle cx="110" cy="110" r="96" fill="none" stroke="rgba(108,143,248,0.08)" stroke-width="8"/>
          <circle id="timerArc" cx="110" cy="110" r="96" fill="none"
            stroke="url(#timerGrad)" stroke-width="12"
            stroke-linecap="round"
            stroke-dasharray="603.2"
            stroke-dashoffset="0"
            style="transition: stroke-dashoffset .5s linear; transform-origin: center; transform: rotate(-90deg); filter: drop-shadow(0 0 8px var(--accent))"/>
          <defs>
            <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6c8ff8"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="focus-ring-inner">
          <div class="focus-timer" id="timerDisplay">45:00</div>
          <p id="timerState" style="color:var(--text-muted);font-size:.875rem">Ready to focus</p>
        </div>
      </div>

      <div class="focus-btn-group">
        <button class="btn-focus start" id="btnStart" onclick="startTimer()">▶ Start</button>
        <button class="btn-focus pause" id="btnPause" onclick="pauseTimer()" style="display:none">⏸ Pause</button>
        <button class="btn-focus reset" onclick="resetTimer()">↺ Reset</button>
      </div>

      <!-- Session length picker -->
      <div style="margin-top:2.5rem">
        <p style="font-size:.875rem;color:var(--text-muted);margin-bottom:.75rem">Session Length</p>
        <div style="display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap">
          <button class="filter-btn" onclick="setDuration(15)">15 min</button>
          <button class="filter-btn" onclick="setDuration(25)">25 min</button>
          <button class="filter-btn active" onclick="setDuration(45)">45 min</button>
          <button class="filter-btn" onclick="setDuration(60)">60 min</button>
          <button class="filter-btn" onclick="setDuration(90)">90 min</button>
        </div>
      </div>

      <!-- Session stats -->
      <div class="fade-in" style="margin-top:4rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;text-align:center">
        <div class="stat-card" style="background: rgba(99,102,241,0.05); backdrop-filter: blur(10px); padding: 1.25rem">
          <div class="stat-label">Sessions Today</div>
          <div class="stat-value" id="sessionsToday" style="color:var(--accent);font-size:1.75rem; text-shadow: var(--glow)">0</div>
        </div>
        <div class="stat-card" style="background: rgba(139,92,246,0.05); backdrop-filter: blur(10px); padding: 1.25rem">
          <div class="stat-label">Total Focus Time</div>
          <div class="stat-value" style="color:var(--accent2);font-size:1.75rem">
            <span id="totalFocusTime">0</span><span class="unit">m</span>
          </div>
        </div>
        <div class="stat-card" style="background: rgba(16,185,129,0.05); backdrop-filter: blur(10px); padding: 1.25rem">
          <div class="stat-label">Completed Today</div>
          <div class="stat-value" id="completedToday" style="color:var(--motivated);font-size:1.75rem">0</div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/auth.js"></script>
  <script>
    requireAuth();

    // Load mood from localStorage
    const savedMood = localStorage.getItem('mf_mood') || 'neutral';
    const moodDurations = { motivated: 90, neutral: 45, tired: 20, stressed: 25 };
    let totalSeconds = (moodDurations[savedMood] || 45) * 60;
    let originalSeconds = totalSeconds;
    let timerInterval = null;
    let isRunning = false;
    let sessions = parseInt(localStorage.getItem('mf_sessions') || '0');
    let totalFocus = parseInt(localStorage.getItem('mf_focus_time') || '0');

    document.getElementById('focusMood').textContent = savedMood.charAt(0).toUpperCase() + savedMood.slice(1);
    document.getElementById('focusDuration').textContent = (moodDurations[savedMood] || 45) + ' min';
    document.getElementById('sessionsToday').textContent = sessions;
    document.getElementById('totalFocusTime').textContent = totalFocus + 'm';

    // Set duration from mood
    totalSeconds = (moodDurations[savedMood] || 45) * 60;
    originalSeconds = totalSeconds;
    updateDisplay();

    function setDuration(mins) {
      if (isRunning) return;
      totalSeconds = mins * 60;
      originalSeconds = mins * 60;
      updateDisplay();
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    function updateDisplay() {
      const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const s = (totalSeconds % 60).toString().padStart(2, '0');
      document.getElementById('timerDisplay').textContent = `${m}:${s}`;
      // Update arc
      const pct = totalSeconds / originalSeconds;
      const circ = 603.2;
      document.getElementById('timerArc').style.strokeDashoffset = circ * (1 - pct);
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      document.getElementById('btnStart').style.display = 'none';
      document.getElementById('btnPause').style.display = 'flex';
      document.getElementById('timerState').textContent = 'Focusing...';

      timerInterval = setInterval(() => {
        if (totalSeconds <= 0) {
          clearInterval(timerInterval);
          isRunning = false;
          document.getElementById('timerState').textContent = '🎉 Session complete!';
          document.getElementById('btnStart').style.display = 'flex';
          document.getElementById('btnPause').style.display = 'none';
          sessions++;
          totalFocus += Math.round(originalSeconds / 60);
          localStorage.setItem('mf_sessions', sessions);
          localStorage.setItem('mf_focus_time', totalFocus);
          document.getElementById('sessionsToday').textContent = sessions;
          document.getElementById('totalFocusTime').textContent = totalFocus;
          showToast('🎉 Focus session complete!', 'success');
          return;
        }
        totalSeconds--;
        updateDisplay();
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      document.getElementById('btnStart').style.display = 'flex';
      document.getElementById('btnPause').style.display = 'none';
      document.getElementById('timerState').textContent = 'Paused';
    }

    function resetTimer() {
      pauseTimer();
      totalSeconds = originalSeconds;
      updateDisplay();
      document.getElementById('timerState').textContent = 'Ready to focus';
    }
  </script>
</body>
</html>
