<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodFlow — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-noise"></div>

  <div class="auth-page page-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>🧠 MoodFlow</h1>
        <p>AI-Powered Mood-Based Productivity</p>
      </div>

      <div id="alertBox" class="alert alert-error"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">
        Sign In →
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('mf_token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
