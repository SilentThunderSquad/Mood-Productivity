<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodFlow — Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-noise"></div>

  <div class="auth-page page-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>🧠 MoodFlow</h1>
        <p>Create your productivity account</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Alex Johnson" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--text-dim);font-size:.8rem;">(min 6 chars)</span></label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="doRegister()">
        Create Account →
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
